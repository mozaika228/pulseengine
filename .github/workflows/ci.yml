name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify (tests + coverage)
        run: mvn -B -DskipTests=false verify

      - name: Upload JaCoCo report artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

  jmh-smoke:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile tests
        run: mvn -B -DskipTests test-compile

      - name: JMH smoke (core benchmark)
        run: >-
          mvn -B org.codehaus.mojo:exec-maven-plugin:3.5.0:java
          -Dexec.classpathScope=test
          -Dexec.mainClass=org.openjdk.jmh.Main
          "-Dexec.args=CoreOrderBookBenchmark.iocCrossingOrder -wi 0 -i 1 -r 1s -f 0 -tu ns"

  cpp-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install C++ benchmark toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libbenchmark-dev

      - name: Configure CMake
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release -DPULSEENGINE_BUILD_BENCHMARKS=ON

      - name: Build native targets
        run: cmake --build cpp/build --config Release

      - name: Run Google Benchmark (insert limit)
        run: |
          ./cpp/build/order_book_insert_bench \
            --benchmark_format=json \
            --benchmark_out=cpp/build/order_book_insert_bench.json

      - name: Upload C++ benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpp-benchmark-results
          path: cpp/build/order_book_insert_bench.json
