name: Soak Qualification

on:
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: Native parity soak duration in seconds
        required: true
        default: '21600'
      min_throughput_ops:
        description: Minimum average soak throughput (ops/sec)
        required: true
        default: '100000'
      seed:
        description: Deterministic seed for soak run
        required: true
        default: '20260221'
  schedule:
    - cron: '0 2 * * 0'

concurrency:
  group: soak-qualification
  cancel-in-progress: false

jobs:
  native-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 390
    env:
      SOAK_DURATION_SECONDS: ${{ inputs.duration_seconds || '21600' }}
      SOAK_MIN_THROUGHPUT_OPS: ${{ inputs.min_throughput_ops || '100000' }}
      SOAK_SEED: ${{ inputs.seed || '20260221' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install native toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libbenchmark-dev

      - name: Configure CMake
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release -DPULSEENGINE_BUILD_BENCHMARKS=ON

      - name: Build native library
        run: cmake --build cpp/build --config Release

      - name: Compile Java sources
        run: mvn -B -DskipTests compile test-compile

      - name: Run native parity soak
        env:
          JAVA_TOOL_OPTIONS: -Djava.library.path=${{ github.workspace }}/cpp/build
          LD_LIBRARY_PATH: ${{ github.workspace }}/cpp/build
        run: |
          set -euo pipefail
          mkdir -p target
          mvn -B org.codehaus.mojo:exec-maven-plugin:3.5.0:java \
            -Dexec.classpathScope=compile \
            -Dexec.mainClass=io.pulseengine.app.NativeParitySoakTool \
            "-Dexec.args=${SOAK_DURATION_SECONDS} ${SOAK_SEED} 9400" | tee target/native-soak.txt

      - name: Validate soak gates
        run: >-
          python3 scripts/perf/validate_soak.py
          --soak target/native-soak.txt
          --min-duration-sec ${{ env.SOAK_DURATION_SECONDS }}
          --min-throughput-ops ${{ env.SOAK_MIN_THROUGHPUT_OPS }}
          --out-report target/soak-qualification-report.md

      - name: Upload soak report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-qualification-report
          path: |
            target/native-soak.txt
            target/soak-qualification-report.md

  recovery-qualification:
    runs-on: ubuntu-latest
    needs: native-soak

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install native toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libbenchmark-dev

      - name: Configure CMake
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release -DPULSEENGINE_BUILD_BENCHMARKS=ON

      - name: Build native library
        run: cmake --build cpp/build --config Release

      - name: Run recovery and parity qualification tests
        env:
          JAVA_TOOL_OPTIONS: -Djava.library.path=${{ github.workspace }}/cpp/build
          LD_LIBRARY_PATH: ${{ github.workspace }}/cpp/build
        run: >-
          mvn -B -Dtest=CoordinatedRecoveryTest,JournalRecoveryTest,NativeParityFuzzTest,NativeIcebergTest,NativeAbiCompatibilityTest test

      - name: Upload recovery qualification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recovery-qualification-reports
          path: |
            target/surefire-reports/