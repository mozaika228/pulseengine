name: Staging Canary

on:
  workflow_dispatch:
    inputs:
      soak_duration_seconds:
        description: Canary soak duration in seconds
        required: true
        default: '900'
      min_throughput_ops:
        description: Minimum canary throughput ops/sec
        required: true
        default: '100000'
      seed:
        description: Deterministic seed
        required: true
        default: '20260221'
  schedule:
    - cron: '0 1 * * *'

jobs:
  canary:
    runs-on: ubuntu-latest
    env:
      SOAK_DURATION_SECONDS: ${{ inputs.soak_duration_seconds || '900' }}
      SOAK_MIN_THROUGHPUT_OPS: ${{ inputs.min_throughput_ops || '100000' }}
      SOAK_SEED: ${{ inputs.seed || '20260221' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install native toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libbenchmark-dev

      - name: Configure CMake
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release -DPULSEENGINE_BUILD_BENCHMARKS=ON

      - name: Build native targets
        run: cmake --build cpp/build --config Release

      - name: Compile Java sources
        run: mvn -B -DskipTests compile test-compile

      - name: Run canary soak
        env:
          JAVA_TOOL_OPTIONS: -Djava.library.path=${{ github.workspace }}/cpp/build
          LD_LIBRARY_PATH: ${{ github.workspace }}/cpp/build
        run: >-
          mvn -B org.codehaus.mojo:exec-maven-plugin:3.5.0:java
          -Dexec.classpathScope=compile
          -Dexec.mainClass=io.pulseengine.app.NativeParitySoakTool
          "-Dexec.args=${SOAK_DURATION_SECONDS} ${SOAK_SEED} 9400"
          > target/staging-canary-soak.txt

      - name: Run canary transport check
        env:
          JAVA_TOOL_OPTIONS: -Djava.library.path=${{ github.workspace }}/cpp/build
          LD_LIBRARY_PATH: ${{ github.workspace }}/cpp/build
        run: >-
          mvn -B org.codehaus.mojo:exec-maven-plugin:3.5.0:java
          -Dexec.classpathScope=compile
          -Dexec.mainClass=io.pulseengine.app.AeronUdpMulticastDemo
          > target/staging-canary-transport.txt

      - name: Validate canary gates
        run: >-
          python3 scripts/perf/validate_canary_v2.py
          --soak target/staging-canary-soak.txt
          --transport target/staging-canary-transport.txt
          --min-throughput ${{ env.SOAK_MIN_THROUGHPUT_OPS }}
          --out target/staging-canary-report.md

      - name: Upload canary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-canary-report
          path: |
            target/staging-canary-soak.txt
            target/staging-canary-transport.txt
            target/staging-canary-report.md
